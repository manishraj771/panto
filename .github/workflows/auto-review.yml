name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Use GitHub Secret
        env:
          DEPLOY_ACCESS_TOKEN: ${{ secrets.DEPLOY_ACCESS_TOKEN }}  
        run: |
          echo "Using GitHub Token..."
          echo "DEPLOY_ACCESS_TOKEN is set but hidden in logs."

      - name: Deploy
        run: |
          echo "Deploying the app..."
          npm run build
          npm run deploy
        
